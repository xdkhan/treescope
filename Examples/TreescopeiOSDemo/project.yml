name: TreescopeiOSDemo
options:
  bundleIdPrefix: com.treescope
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Treescope:
    # Local SwiftPM package at the repo root.
    path: ../..

targets:
  TreescopeiOSDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: Treescope
        product: TreescopeServer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.treescope.iosdemo
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: NO
